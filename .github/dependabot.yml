version: 2
updates:
  # npm dependencies across the pnpm workspace.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR for routine dev-tooling bumps to cut review noise.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Keep GitHub Actions current; Dependabot bumps the pinned SHA and the
  # trailing version comment together.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
