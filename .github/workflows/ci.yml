name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20, 22]
        include:
          - os: macos-latest
            node: 22
          - os: windows-latest
            node: 22
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:all
      - run: pnpm run typecheck
      - run: pnpm test
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: pnpm run format:check

  dogfood:
    name: scan self
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Scan this repo's own lockfile online; never fail CI on self-scan.
      - run: node packages/cli/dist/index.js scan . --online --format sarif --output lockhawk.sarif --fail-on critical || true
      - uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: lockhawk.sarif
          category: lockhawk-self
        continue-on-error: true
