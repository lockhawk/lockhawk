name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20, 22]
        include:
          - os: macos-latest
            node: 22
          - os: windows-latest
            node: 22
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:all
      - run: pnpm run typecheck
      - run: pnpm test
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: pnpm run format:check

  dogfood:
    name: scan self
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Scan this repo's own lockfile online; never fail CI on self-scan.
      - run: node packages/cli/dist/index.js scan . --online --format sarif --output lockhawk.sarif --fail-on critical || true
      - uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: lockhawk.sarif
          category: lockhawk-self
        continue-on-error: true
